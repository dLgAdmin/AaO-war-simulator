<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AaO War Simulator</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --parch:#f0deb0;--parch2:#e8d4a0;--parch3:#dfc890;
  --brown:#3a1a00;--brown2:#5c3010;--brown3:#8B5E1A;
  --gold:#c8973a;--gold2:#f0bc50;
  --green:#1a5a0a;--green2:#2d8a18;--green3:#4aaa2a;
  --red:#8b1a1a;--frame:#8B5E1A;
  --text:#1a0800;--text2:#3a1a00;--text3:#6a4010;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--brown);color:var(--text);font-family:'EB Garamond',serif;font-size:15px;min-height:100vh;overflow-x:hidden;}
body.rtl-text .unit-name,body.rtl-text .unit-tag,body.rtl-text .sec-title,body.rtl-text .app-title,body.rtl-text .cap-label,body.rtl-text .slider-label,body.rtl-text .can-grup-header,body.rtl-text .sonuc-lbl,body.rtl-text .tab-label,body.rtl-text .lang-item,body.rtl-text .empty-state,body.rtl-text .lang-current span{font-family:Tahoma,Arial,'Segoe UI',sans-serif;}
body.rtl-text .unit-name,body.rtl-text .unit-tag,body.rtl-text .sec-title,body.rtl-text .can-grup-header,body.rtl-text .empty-state{direction:rtl;text-align:right;}

/* HEADER */
.header{background:linear-gradient(180deg,#0a0500,#1a0800,#2c1000,#1a0800,#0a0500);border-bottom:3px solid var(--gold);position:relative;overflow:hidden;padding:0;}
.header-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(200,100,0,0.25),transparent 70%);pointer-events:none;}
.header-inner{display:flex;flex-direction:column;align-items:center;padding:14px 12px 10px;position:relative;z-index:1;}
.logo-wrap{position:relative;margin-bottom:6px;}
.logo-img{width:160px;height:160px;object-fit:contain;filter:drop-shadow(0 0 25px rgba(255,140,0,0.9)) drop-shadow(0 0 50px rgba(200,80,0,0.6)) drop-shadow(0 0 80px rgba(255,100,0,0.3));border-radius:8px;}
.logo-ring{position:absolute;inset:-6px;border-radius:14px;border:2px solid;border-image:linear-gradient(135deg,#f0bc50,#8B5E1A,#f0bc50,#8B5E1A) 1;pointer-events:none;}
.app-title{font-family:'Cinzel Decorative',serif;font-size:18px;letter-spacing:3px;background:linear-gradient(180deg,#fff5c0,#f0bc50,#c8973a,#f0bc50);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;margin-bottom:2px;text-align:center;}
.app-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:rgba(200,150,60,0.7);text-transform:uppercase;margin-bottom:4px;}
.designed-by{font-family:'Cinzel Decorative',serif;font-size:13px;letter-spacing:2.5px;background:linear-gradient(90deg,#ff6b35,#f7c59f,#ffe66d,#4ecdc4,#a855f7,#ff6b35);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shine 3s linear infinite;text-align:center;text-shadow:none;margin-top:4px;}
@keyframes shine{to{background-position:200% center;}}

/* LANGUAGE DROPDOWN */
.lang-wrap{position:absolute;top:10px;right:10px;z-index:100;}
body.rtl-text .lang-wrap{right:auto;left:10px;}
.lang-current{background:linear-gradient(180deg,#5a3010,#3a1a00);border:1.5px solid var(--gold);border-radius:6px;color:var(--gold2);font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;}
.lang-current:active{transform:scale(0.95);}
.lang-flag-cur{font-size:14px;}
.lang-arrow{font-size:8px;color:rgba(240,188,80,0.7);transition:transform 0.2s;}
.lang-arrow.open{transform:rotate(180deg);}
.lang-menu{position:absolute;top:calc(100% + 6px);right:0;background:linear-gradient(180deg,#3a2000,#1a0a00);border:1.5px solid var(--gold);border-radius:8px;min-width:175px;box-shadow:0 8px 24px rgba(0,0,0,0.65);overflow:hidden;display:none;}
body.rtl-text .lang-menu{right:auto;left:0;}
.lang-menu.open{display:block;}
.lang-item{display:flex;align-items:center;gap:9px;padding:9px 12px;font-family:'Cinzel',serif;font-size:12px;color:rgba(240,188,80,0.85);cursor:pointer;border-bottom:1px solid rgba(200,150,60,0.15);}
.lang-item:last-child{border-bottom:none;}
.lang-item.active{background:rgba(200,150,60,0.22);color:var(--gold2);font-weight:700;}
.lang-item:active{background:rgba(200,150,60,0.3);}
.lang-flag{font-size:16px;}
.lang-check{margin-left:auto;font-size:10px;color:var(--gold2);}
body.rtl-text .lang-check{margin-left:0;margin-right:auto;}

/* TAB BAR */
.tab-bar{display:flex;background:linear-gradient(180deg,#2c1000,#1a0800);border-bottom:2px solid var(--gold);}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;cursor:pointer;border:none;background:transparent;border-bottom:3px solid transparent;}
.tab-btn.active{background:rgba(200,150,60,0.15);border-bottom-color:var(--gold2);}
.tab-icon{font-size:20px;margin-bottom:2px;}
.tab-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;color:rgba(200,150,60,0.5);}
.tab-btn.active .tab-label{color:var(--gold2);}

/* PAGES */
.page{display:none;padding-bottom:20px;}
.page.active{display:block;}

/* INPUTS TOP */
.cap-area{background:var(--parch);padding:10px 12px;border-bottom:1px solid rgba(139,94,26,0.3);}
.cap-row{display:flex;gap:8px;}
.cap-field{flex:1;}
.cap-label{font-family:'Cinzel',serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:3px;display:block;}
.cap-input{background:rgba(255,255,255,0.7);border:1.5px solid var(--gold);border-radius:4px;color:var(--text);font-family:'Cinzel',serif;font-size:18px;padding:7px 10px;outline:none;width:100%;}
.cap-input:focus{border-color:var(--gold2);background:white;}

/* SLIDERS */
.slider-section{background:var(--parch2);padding:10px 12px;border-bottom:1px solid rgba(139,94,26,0.3);}
.slider-row{margin-bottom:10px;}
.slider-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;gap:6px;}
.slider-val{font-family:'Cinzel Decorative',serif;font-size:14px;color:var(--brown2);font-weight:700;flex-shrink:0;}
.slider-steps{display:flex;gap:3px;flex-wrap:wrap;}
.step-btn{flex:1;min-width:0;padding:7px 3px;border:2px solid var(--gold);border-radius:4px;background:rgba(255,255,255,0.4);font-family:'Cinzel',serif;font-size:11px;color:var(--text2);cursor:pointer;text-align:center;}
.step-btn.active{background:linear-gradient(180deg,var(--gold2),var(--gold));color:var(--brown);border-color:var(--brown2);font-weight:700;}

/* SECTION HEADER */
.sec-header{background:linear-gradient(135deg,var(--parch3),var(--parch2));border-top:2px solid var(--brown2);border-bottom:2px solid var(--brown2);padding:8px 14px;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:4px;}
.sec-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;color:var(--brown);text-align:center;}
.sec-dot{color:var(--gold);font-size:10px;}

/* UNIT ROWS */
.unit-list{background:var(--parch);}
.unit-row{display:flex;align-items:center;padding:8px 10px;border-bottom:1px solid rgba(139,94,26,0.2);gap:8px;}
.unit-frame{width:48px;height:48px;flex-shrink:0;border:2px solid var(--frame);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;background:linear-gradient(135deg,#2a1a00,#1a0a00);}
.unit-badge{position:absolute;top:-5px;left:-5px;min-width:22px;height:16px;padding:0 3px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:7px;font-weight:700;}
.badge-g9{background:linear-gradient(135deg,#5a4010,#3a2800);border:1px solid var(--gold);color:var(--gold2);}
.badge-g8{background:linear-gradient(135deg,#3a2800,#2a1800);border:1px solid var(--gold);color:var(--gold);}
.badge-s9{background:linear-gradient(135deg,#4a006a,#2a0040);border:1px solid #aa40aa;color:#dd80dd;}
.badge-s8{background:linear-gradient(135deg,#2a0040,#1a0028);border:1px solid #8a208a;color:#cc60cc;}
.unit-info{flex:1;min-width:0;}
.unit-name{font-family:'Cinzel',serif;font-size:10px;color:var(--text2);font-weight:700;margin-bottom:2px;}
.unit-tag{font-family:'Cinzel',serif;font-size:7.5px;color:var(--text3);margin-bottom:4px;}
.unit-count{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--green2);}
.unit-bar-track{height:6px;background:rgba(139,94,26,0.2);border:1px solid rgba(139,94,26,0.4);border-radius:4px;overflow:hidden;margin-top:3px;}
.unit-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--green3));transition:width 0.5s;}
.copy-btn{background:linear-gradient(180deg,#4aaa2a,#1a5a0a);border:1px solid #0a3a05;border-radius:4px;color:white;font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;padding:8px 8px;cursor:pointer;flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,0.3);white-space:nowrap;}

/* TİP BADGE */
.tip-badge{display:inline-block;font-family:'Cinzel',serif;font-size:7px;padding:1px 5px;border-radius:3px;margin-right:4px;}
body.rtl-text .tip-badge{margin-right:0;margin-left:4px;}
.tip-ucan{background:rgba(26,90,154,0.2);color:#1a5a9a;border:1px solid #1a5a9a;}
.tip-suvari{background:rgba(139,94,26,0.2);color:var(--brown2);border:1px solid var(--brown2);}
.tip-piyade{background:rgba(139,26,26,0.2);color:#8b1a1a;border:1px solid #8b1a1a;}
.tip-menzilli{background:rgba(26,90,10,0.2);color:var(--green);border:1px solid var(--green);}

/* CANAVAR GRUP */
.can-grup-header{font-family:'Cinzel Decorative',serif;font-size:10px;letter-spacing:2px;padding:6px 12px;margin:4px 8px;border-radius:5px;text-align:center;border:1px solid;}
.sev-m9{background:linear-gradient(135deg,rgba(180,140,0,0.25),rgba(120,90,0,0.1));color:#5a4000;border-color:var(--gold);}
.sev-m8{background:linear-gradient(135deg,rgba(80,80,80,0.2),rgba(40,40,40,0.1));color:#2a2a2a;border-color:#555;}
.sev-m7{background:linear-gradient(135deg,rgba(139,0,0,0.15),rgba(80,0,0,0.05));color:#6a0000;border-color:#aa2020;}

/* CALC BTN */
.calc-btn{background:linear-gradient(180deg,var(--green3),var(--green));border:2px solid #0a3a05;border-radius:6px;color:white;font-family:'Cinzel',serif;font-size:13px;letter-spacing:2px;padding:12px;width:100%;cursor:pointer;margin-top:4px;}
.calc-btn:active{transform:scale(0.98);}

/* SONUÇ */
.sonuc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--parch);padding:12px;}
.sonuc-card{background:rgba(0,0,0,0.05);border:1px solid rgba(139,94,26,0.3);border-radius:4px;padding:10px;text-align:center;}
.sonuc-val{font-family:'Cinzel',serif;font-size:16px;font-weight:700;}
.sonuc-lbl{font-family:'Cinzel',serif;font-size:7.5px;color:var(--text3);margin-top:3px;}

/* BOTTOM BTNS */
.action-btns{padding:10px 12px;display:flex;gap:8px;}
.action-btn{flex:1;padding:11px;border-radius:5px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;cursor:pointer;border:none;}
.action-btn.copy{background:linear-gradient(180deg,#4aaa2a,#1a5a0a);border:1px solid #0a3a05;color:white;}
.action-btn.share{background:linear-gradient(180deg,#3a6aaa,#1a3a7a);border:1px solid #0a1a5a;color:white;}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:150;background:linear-gradient(180deg,#2c1000,#1a0800);border-top:2px solid var(--gold);padding:8px 12px;box-shadow:0 -4px 16px rgba(0,0,0,0.6);}
.bottom-stats{display:flex;gap:10px;margin-bottom:6px;}
.bstat{display:flex;align-items:center;gap:4px;font-family:'Cinzel',serif;font-size:11px;color:var(--gold2);}
.bstat-val{font-weight:700;}
.bstat-max{color:rgba(200,150,60,0.6);}
.bottom-btns{display:flex;gap:8px;}
.bottom-btn{flex:1;padding:10px;border:none;border-radius:5px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;cursor:pointer;}
.bottom-btn.clear{background:linear-gradient(180deg,#4a3010,#2c1a00);border:1px solid var(--gold);color:var(--gold2);}
.bottom-btn.go{background:linear-gradient(180deg,var(--green3),var(--green));border:1px solid #0a3a05;color:white;}
.bottom-btn.share2{background:linear-gradient(180deg,#3a6aaa,#1a3a7a);border:1px solid #0a1a5a;color:white;}

#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--green);color:white;padding:10px 18px;border-radius:8px;font-family:'Cinzel',serif;font-size:11px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.5);text-align:center;max-width:85vw;display:none;border:1px solid var(--green3);}
.empty-state{text-align:center;padding:30px 20px;color:var(--text3);font-style:italic;background:var(--parch);}
</style>
</head>

<div id="toast"></div>

  <div class="header-glow"></div>

      <span class="lang-flag-cur" id="langCurFlag">🇹🇷</span>

  if(n>=1e6) return (n/1e6).toFixed(1)+'M';

  return Math.round(n)+'';

function showTab(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});

  document.getElementById('page-'+id).classList.add('active');
  var tabs=['hesap','ordu','canavar'];

}

  var txt=String(Math.round(val));
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){toast('📋 '+isim+': '+txt);}).catch(function(){fb(txt,isim);});
    } else {fb(txt,isim);}
  }catch(e){fb(txt,isim);}
}
function fb(txt,isim){
  var el=document.createElement('textarea');el.value=txt;el.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(el);el.focus();el.select();
  try{document.execCommand('copy');toast('📋 '+isim+': '+txt);}catch(e){toast(T('toastHata'));}
  document.body.removeChild(el);
}

/* ============ HESAPLA ============ */
function hesapla(){
  var gsCap=parseInt(document.getElementById('gs_cap').value)||0;
  var mcCap=parseInt(document.getElementById('mc_cap').value)||0;
  var counts={};

  if(gsCap>0){
    var fark=1+ozelFark/100;
    var toplamLdr=0;
    BIRLIKLERSIRA.forEach(function(b){
      var sevKat = (b.badge==='G8'||b.badge==='S8') ? 1 : (1/secilenOran);
      var ozelKat = (b.badge==='S9'||b.badge==='S8') ? fark : 1;
      b._kat = sevKat * tipKat(b.tip) * ozelKat;
      toplamLdr += b._kat * b.ldr;
    });
    var X = toplamLdr>0 ? Math.floor(gsCap/toplamLdr) : 0;
    BIRLIKLERSIRA.forEach(function(b){
      counts[b.id] = Math.floor(X * b._kat);
    });
  }

  if(mcCap>0){
    var BAZ=9;
    var topNuf=0;
    CANAVARLAR.forEach(function(c){
      var sk=Math.pow(secilenOran,BAZ-c.sev);
      c._sk=sk;
      topNuf+=sk*c.nuf;
    });
    var Y=topNuf>0?Math.floor(mcCap/topNuf):0;
    CANAVARLAR.forEach(function(c){
      counts['can_'+c.id]=Math.floor(Y*c._sk);
    });
  }

  var gsUsed=0,mcUsed=0,flyCount=0;
  BIRLIKLERSIRA.forEach(function(b){
    var c=counts[b.id]||0;
    gsUsed+=c*b.ldr;
    if(b.tip==='ucan') flyCount+=c;
  });
  CANAVARLAR.forEach(function(c){
    var cnt=counts['can_'+c.id]||0;
    mcUsed+=cnt*c.nuf;
  });

  sonuc={counts:counts,gsUsed:gsUsed,mcUsed:mcUsed,gsRem:gsCap-gsUsed,mcRem:mcCap-mcUsed,gsCap:gsCap,mcCap:mcCap,flyCount:flyCount};

  document.getElementById('b-ldr').textContent=fmt(gsUsed);
  document.getElementById('b-ldr-max').textContent=fmt(gsCap);
  document.getElementById('b-fly').textContent=fmt(flyCount);
  document.getElementById('b-nuf').textContent=fmt(mcUsed);
  document.getElementById('b-nuf-max').textContent=fmt(mcCap);

  buildOrdu();
  buildCanavar();
  buildHesapResult();
  showTab('ordu');
}

function buildOrdu(){
  if(!sonuc) return;
  var r=sonuc;
  var gruplar={ucan:T('grpUcan'),suvari:T('grpSuvari'),menzpiy9:T('grpMenzpiy9'),menzpiy8:T('grpMenzpiy8')};
  var maxCnt=1;
  BIRLIKLERSIRA.forEach(function(b){if((r.counts[b.id]||0)>maxCnt) maxCnt=r.counts[b.id];});

  var h='';
  var curGrup='';
  BIRLIKLERSIRA.forEach(function(b){
    var c=r.counts[b.id]||0;
    if(c<=0) return;
    if(b.grup!==curGrup){
      if(curGrup) h+='</div>';
      curGrup=b.grup;
      h+='<div class="sec-header"><span class="sec-dot">♦</span><span class="sec-title">'+gruplar[b.grup]+'</span><span class="sec-dot">♦</span></div><div class="unit-list">';
    }
    var pct=Math.min(100,c/maxCnt*100);
    var nm=unitFullName(b);
    h+='<div class="unit-row">';
    h+='<div class="unit-frame">'+b.e+'<div class="unit-badge '+b.bCls+'">'+b.badge+'</div></div>';
    h+='<div class="unit-info">';
    h+='<div class="unit-name">'+nm+' <span style="font-size:9px;color:var(--text3)">'+b.tag+'</span></div>';
    h+='<div class="unit-tag"><span class="tip-badge '+tipCls(b.tip)+'">'+tipLbl(b.tip)+'</span> '+T('ldrLabel')+b.ldr+'</div>';
    h+='<div class="unit-count">'+fmt(c)+'</div>';
    h+='<div class="unit-bar-track"><div class="unit-bar-fill" style="width:'+pct+'%"></div></div>';
    h+='</div>';
    h+='<button class="copy-btn" onclick="kopyala('+c+',\''+nm.replace(/'/g,"\\'")+'\')">📋<br>'+T('copyBtn')+'</button>';
    h+='</div>';
  });
  if(curGrup) h+='</div>';
  h+='<div class="action-btns"><button class="action-btn copy" onclick="tumunuKopyala()">'+T('copyAllBtn')+'</button><button class="action-btn share" onclick="paylasMetin()">'+T('shareBtn2')+'</button></div>';
  document.getElementById('ordu-content').innerHTML=h||'<div class="empty-state">'+T('emptySonuc')+'</div>';
}

function buildCanavar(){
  if(!sonuc) return;
  var r=sonuc;
  var h='<div class="sec-header"><span class="sec-dot">♦</span><span class="sec-title">'+T('canBaslik')+'</span><span class="sec-dot">♦</span></div>';
  var curSev=0;
  CANAVARLAR.forEach(function(c){
    var cnt=r.counts['can_'+c.id]||0;
    if(cnt<=0) return;
    if(c.sev!==curSev){
      if(curSev) h+='</div>';
      curSev=c.sev;
      var meta=SEV_META[c.sev];
      h+='<div class="can-grup-header '+meta.cls+'">'+meta.label+'</div><div class="unit-list">';
    }
    var nm=unitFullName(c);
    h+='<div class="unit-row">';
    h+='<div class="unit-frame">'+c.e+'<div class="unit-badge badge-g9">M'+c.sev+'</div></div>';
    h+='<div class="unit-info">';
    h+='<div class="unit-name">'+nm+'</div>';
    h+='<div class="unit-tag">🦁 '+c.nuf+' · 💪 '+fmtK(c.guc)+' · ❤️ '+fmtK(c.sag)+'</div>';
    h+='<div class="unit-count">'+fmt(cnt)+'</div>';
    h+='</div>';
    h+='<button class="copy-btn" onclick="kopyala('+cnt+',\''+nm.replace(/'/g,"\\'")+'\')">📋<br>'+T('copyBtn')+'</button>';
    h+='</div>';
  });
  if(curSev) h+='</div>';
  h+='<div class="action-btns"><button class="action-btn copy" onclick="tumunuKopyala()">'+T('copyAllBtn')+'</button><button class="action-btn share" onclick="paylasMetin()">'+T('shareBtn2')+'</button></div>';
  document.getElementById('canavar-content').innerHTML=h;
}

function buildHesapResult(){
  if(!sonuc) return;
  var r=sonuc;
  document.getElementById('hesap-result').innerHTML=
    '<div class="sonuc-grid">'+
    '<div class="sonuc-card"><div class="sonuc-val" style="color:var(--green2)">'+fmt(r.gsUsed)+'</div><div class="sonuc-lbl">'+T('ldrKul')+'</div></div>'+
    '<div class="sonuc-card"><div class="sonuc-val" style="color:var(--red)">'+fmt(Math.max(0,r.gsRem))+'</div><div class="sonuc-lbl">'+T('ldrKal')+'</div></div>'+
    '<div class="sonuc-card"><div class="sonuc-val" style="color:var(--green2)">'+fmt(r.mcUsed)+'</div><div class="sonuc-lbl">'+T('nufKul')+'</div></div>'+
    '<div class="sonuc-card"><div class="sonuc-val" style="color:var(--red)">'+fmt(Math.max(0,r.mcRem))+'</div><div class="sonuc-lbl">'+T('nufKal')+'</div></div>'+
    '</div>';
}

function tumMetinOlustur(){
  if(!sonuc) return '';
  var r=sonuc;
  var NL='\n', SEP='─────────────────────────────'+NL;
  var txt=T('txtOrduBaslik')+NL+SEP;
  txt+=T('txtOranEtiket')+secilenOran+T('txtUcanX')+ucanSuvari+T('txtEqSuvari')+T('txtSuvariX')+suvariPiyade+T('txtEqPiyMenz')+T('txtOzelYuzde')+ozelFark+T('txtFazla')+NL+SEP;
  BIRLIKLERSIRA.forEach(function(b){
    var c=r.counts[b.id]||0;
    if(c>0) txt+=unitFullName(b)+' '+b.tag+': '+fmt(c)+NL;
  });
  var hasCan=CANAVARLAR.some(function(c){return (r.counts['can_'+c.id]||0)>0;});
  if(hasCan){
    txt+=NL+SEP+T('canBaslik')+NL+SEP;
    CANAVARLAR.forEach(function(c){
      var cnt=r.counts['can_'+c.id]||0;
      if(cnt>0) txt+=unitFullName(c)+': '+fmt(cnt)+NL;
    });
  }
  txt+=NL+SEP;
  txt+=T('txtLdrEtiket')+fmt(r.gsUsed)+'/'+fmt(r.gsCap)+T('txtNufEtiket')+fmt(r.mcUsed)+'/'+fmt(r.mcCap)+NL;
  txt+='✦ Battle Balance · AaO War Simulator ✦'+NL+'✦ Designed By DaBBe & SiRiuS VeGa ✦';
  return txt;
}

function tumunuKopyala(){
  var txt=tumMetinOlustur();
  if(!txt){toast(T('toastOnceHesapla'));return;}
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(txt).then(function(){toast(T('toastKopyalandi'));}).catch(function(){fb2(txt);});
    } else {fb2(txt);}
  }catch(e){fb2(txt);}
}
function fb2(txt){
  var el=document.createElement('textarea');el.value=txt;el.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(el);el.focus();el.select();
  try{document.execCommand('copy');toast(T('toastKopyalandi'));}catch(e){toast(T('toastHata'));}
  document.body.removeChild(el);
}
function paylasMetin(){
  var txt=tumMetinOlustur();
  if(!txt){toast(T('toastOnceHesapla'));return;}
  if(navigator.share){
    navigator.share({title:'Battle Balance',text:txt}).catch(function(){tumunuKopyala();});
  } else {
    tumunuKopyala();
    toast(T('toastKopyalandi'));
  }
}

/* ============ LANGUAGE DROPDOWN ============ */
function buildLangMenu(){
  var menu=document.getElementById('langMenu');
  var h='';
  LANGS.forEach(function(l){
    h+='<div class="lang-item'+(l.code===lang?' active':'')+'" onclick="selectLang(\''+l.code+'\')">'+
       '<span class="lang-flag">'+l.flag+'</span><span>'+l.name+'</span>'+
       (l.code===lang?'<span class="lang-check">✓</span>':'')+
       '</div>';
  });
  menu.innerHTML=h;
}
function toggleLangMenu(){
  var menu=document.getElementById('langMenu');
  var arrow=document.getElementById('langArrow');
  var isOpen=menu.classList.contains('open');
  if(isOpen){
    menu.classList.remove('open');
    arrow.classList.remove('open');
  } else {
    buildLangMenu();
    menu.classList.add('open');
    arrow.classList.add('open');
  }
}
function selectLang(code){
  lang=code;
  var cur=LANGS.find(function(l){return l.code===code;});
  document.getElementById('langCurFlag').textContent=cur.flag;
  document.getElementById('langCurCode').textContent=cur.code.toUpperCase();
  document.getElementById('langMenu').classList.remove('open');
  document.getElementById('langArrow').classList.remove('open');
  document.body.classList.toggle('rtl-text', code==='ar');
  applyLang();
  if(sonuc){buildOrdu();buildCanavar();buildHesapResult();}
}
document.addEventListener('click', function(e){
  var wrap=document.querySelector('.lang-wrap');
  if(wrap && !wrap.contains(e.target)){
    document.getElementById('langMenu').classList.remove('open');
    document.getElementById('langArrow').classList.remove('open');
  }
});

function applyLang(){
  var map = {
    'tl-hesap':'tabHesap','tl-ordu':'tabOrdu','tl-can':'tabCan',
    'lbl-ldr':'lblLdr','lbl-nuf':'lblNuf','lbl-oran':'lblOran',
    'lbl-us':'lblUs','lbl-sp':'lblSp','lbl-of':'lblOf',
    'btn-hesap':'calcBtn','btn-temizle':'btnTemizle','btn-paylas':'btnPaylas','btn-git':'btnGit',
    'empty-hes-txt':'emptyHes','empty-ordu-txt':'emptyOrdu','empty-can-txt':'emptyOrdu'
  };
  Object.keys(map).forEach(function(id){
    var el=document.getElementById(id);
    if(el) el.textContent=T(map[id]);
  });
  document.getElementById('gs_cap').placeholder=T('phLdr');
  document.getElementById('mc_cap').placeholder=T('phNuf');
}

function resetAll(){
  document.getElementById('gs_cap').value='';
  document.getElementById('mc_cap').value='';
  sonuc=null;
  ['b-ldr','b-fly','b-nuf'].forEach(function(id){document.getElementById(id).textContent='0';});
  ['b-ldr-max','b-nuf-max'].forEach(function(id){document.getElementById(id).textContent='0';});
  document.getElementById('ordu-content').innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:10px">⚔️</div><span id="empty-ordu-txt">'+T('emptyOrdu')+'</span></div>';
  document.getElementById('canavar-content').innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:10px">🐉</div><span id="empty-can-txt">'+T('emptyOrdu')+'</span></div>';
  document.getElementById('hesap-result').innerHTML='<div class="empty-state"><div style="font-size:40px;margin-bottom:10px">⚙️</div><span id="empty-hes-txt">'+T('emptyHes')+'</span></div>';
}

/* add missing shareBtn2 key alias (uses btnPaylas translations) */
TXT.shareBtn2 = TXT.btnPaylas;

/* init */
document.addEventListener('DOMContentLoaded', applyLang);
</script>
